services:
  - type: web
    name: pitboss
    runtime: node
    plan: free
    region: ohio
    buildCommand: npm ci && npm run build
    startCommand: npm run start -w apps/api
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
