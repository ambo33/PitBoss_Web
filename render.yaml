services:
  - type: web
    name: pitboss
    runtime: node
    plan: free
    region: ohio
    buildCommand: npm ci && npm run build
    startCommand: npm run start -w apps/api
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 30d
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
